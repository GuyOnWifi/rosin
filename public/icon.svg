  </defs>
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>
  <g transform="rotate(-45 256 256)">
    <!-- handle -->
    <rect x="206" y="120" width="100" height="170" rx="26" fill="#241006" opacity="0.92"/>
    <rect x="224" y="150" width="64" height="10" rx="5" fill="#ffae73"/>
    <rect x="224" y="176" width="64" height="10" rx="5" fill="#ffae73"/>
    <rect x="224" y="202" width="64" height="10" rx="5" fill="#ffae73"/>
    <!-- shaft -->
    <rect x="236" y="284" width="40" height="70" fill="#3a1a0a"/>
