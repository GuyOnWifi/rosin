<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.38" r="0.85">
      <stop offset="0" stop-color="#2c1d10"/>
      <stop offset="1" stop-color="#140f0a"/>
    </radialGradient>
    <linearGradient id="drop" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#ffe0a3"/>
      <stop offset="0.42" stop-color="#ffab4d"/>
      <stop offset="0.78" stop-color="#f5731f"/>
      <stop offset="1" stop-color="#d6431a"/>
    </linearGradient>
    <radialGradient id="gloss" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="needle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b7c86a"/>
      <stop offset="1" stop-color="#7d9646"/>
    </linearGradient>
    <filter id="sh" x="-30%" y="-20%" width="160%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#bg)"/>

  <!-- pine sprig: rosin is pine resin -->
  <g stroke="url(#needle)" stroke-width="11" stroke-linecap="round" opacity="0.95">
    <line x1="256" y1="120" x2="256" y2="190"/>
    <line x1="256" y1="150" x2="212" y2="120"/>
    <line x1="256" y1="150" x2="300" y2="120"/>
    <line x1="256" y1="176" x2="222" y2="156"/>
    <line x1="256" y1="176" x2="290" y2="156"/>
  </g>

  <!-- molten rosin / flux droplet -->
  <g filter="url(#sh)">
    <path d="M256 168
             C 300 250 360 300 360 356
             a 104 104 0 1 1 -208 0
             C 152 300 212 250 256 168 Z"
          fill="url(#drop)"/>
  </g>
  <!-- specular gloss -->
  <ellipse cx="214" cy="320" rx="40" ry="58" fill="url(#gloss)" transform="rotate(-18 214 320)"/>
  <circle cx="300" cy="404" r="13" fill="#ffffff" opacity="0.35"/>
</svg>
